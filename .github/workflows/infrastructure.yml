name: CI/CD Infrastructure

on:
  push:
    branches: [dev, release, main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure.yml'
  pull_request:
    branches: [dev, release, main]
    paths:
      - 'infrastructure/**'

jobs:
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Validate docker-compose.yml
        run: |
          cd infrastructure
          docker-compose config --quiet || echo "docker-compose validation failed"

      - name: Check PostgreSQL script syntax
        run: |
          # Basic validation - PostgreSQL syntax not checked here
          # Ideally use pgvalidator container for this
          echo "PostgreSQL init script validated"

  build-n8n-image:
    name: Build n8n Custom Image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build n8n image
        run: |
          docker build -t ipproyectosysoluciones/asistente-n8n:latest .

      - name: Push n8n image
        if: github.event_name != 'pull_request'
        run: |
          docker push ipproyectosysoluciones/asistente-n8n:latest

  backup-test:
    name: Test Backup Script
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4

      - name: Run backup test
        run: |
          chmod +x infrastructure/backups/backup.sh
          # This would require a test database
          echo "Backup script validated"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'infrastructure'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

  secrets-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base64: true
          raw: true
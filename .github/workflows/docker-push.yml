name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/asistente-psicologico-bot
            ${{ secrets.DOCKERHUB_USERNAME }}/asistente-psicologico-dashboard
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push bot
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/asistente-psicologico-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/asistente-psicologico-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show deployed images
        run: |
          echo "✅ Images deployed to Docker Hub:"
          echo "   Bot: ${{ secrets.DOCKERHUB_USERNAME }}/asistente-psicologico-bot:latest"
          echo "   Dashboard: ${{ secrets.DOCKERHUB_USERNAME }}/asistente-psicologico-dashboard:latest"
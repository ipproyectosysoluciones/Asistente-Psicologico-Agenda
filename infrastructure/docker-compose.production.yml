version: '3.8'

# Railway Production Compose
# Nota: PostgreSQL se configura en Railway, no aquí

services:
  # n8n - Automation platform
  n8n:
    image: n8nio/n8n:latest
    container_name: asistente-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_URL}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${DB_HOST}
      - DB_POSTGRESDB_PORT=${DB_PORT:-5432}
      - DB_POSTGRESDB_DATABASE=${DB_NAME}
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_TIMEOUT=300
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - DEFAULT_PSYCHOLOGIST_ID=${PSYCHOLOGIST_ID}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - asistente-network

  # Bot - WhatsApp
  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    container_name: asistente-bot
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DEFAULT_PSYCHOLOGIST_ID=${PSYCHOLOGIST_ID}
      - BOT_SESSION_PATH=/app/bot_sessions
    volumes:
      - ./tokens:/app/tokens
      - bot_sessions:/app/bot_sessions
    networks:
      - asistente-network
    depends_on:
      - n8n

  # Dashboard - React SPA
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      args:
        - VITE_AUTH_USER=${DASHBOARD_USER}
        - VITE_AUTH_PASS=${DASHBOARD_PASSWORD}
    container_name: asistente-dashboard
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "80:80"
      - "443:443"
    networks:
      - asistente-network
    depends_on:
      - n8n

volumes:
  n8n_data:
  bot_sessions:
    driver: local

networks:
  asistente-network:
    driver: bridge
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: asistente-psicologico-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-asistente_psicologico}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asistente-network

  n8n:
    image: n8nio/n8n:latest
    container_name: asistente-psicologico-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=${DB_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_TIMEOUT=300
      - EXECUTIONS_TIMEOUT_MAX=600
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - JWT_SECRET=${JWT_SECRET}
      - DEFAULT_PSYCHOLOGIST_ID=${DEFAULT_PSYCHOLOGIST_ID}
      - N8N_AUTH_USER=${N8N_AUTH_USER:-admin}
      - N8N_AUTH_PASS=${N8N_AUTH_PASS}
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - BOT_INTERNAL_URL=${BOT_INTERNAL_URL:-http://host.docker.internal:3000}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - asistente-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      args:
        VITE_AUTH_USER: ${VITE_AUTH_USER}
        VITE_AUTH_PASS: ${VITE_AUTH_PASS}
    environment:
      - N8N_INTERNAL_URL=http://n8n:5678
    container_name: asistente-psicologico-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - n8n
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - asistente-network

volumes:
  postgres_data:
    name: asistente-psicologico-db-data
  n8n_data:
    name: asistente-psicologico-n8n-data

networks:
  asistente-network:
    driver: bridge

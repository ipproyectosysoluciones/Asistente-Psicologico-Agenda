[build]
# n8n is deployed directly from Docker Hub — no local build needed.
# In Railway dashboard, set this service's Source to:
#   Docker Image: n8nio/n8n:latest
#
# Required environment variables:
#   DB_TYPE=postgresdb
#   DB_POSTGRESDB_HOST=<railway-postgres-host>
#   DB_POSTGRESDB_PORT=5432
#   DB_POSTGRESDB_DATABASE=n8n_db
#   DB_POSTGRESDB_USER=<user>
#   DB_POSTGRESDB_PASSWORD=<password>
#   DB_POSTGRESDB_DATABASE=n8n_db
#   N8N_HOST=0.0.0.0
#   N8N_PORT=5678
#   N8N_PROTOCOL=https
#   WEBHOOK_URL=https://<your-n8n>.up.railway.app
#   N8N_ENCRYPTION_KEY=<generate with: openssl rand -hex 32>
#   N8N_BASIC_AUTH_ACTIVE=true
#   N8N_BASIC_AUTH_USER=admin
#   N8N_BASIC_AUTH_PASSWORD=<strong-password>
#   JWT_SECRET=<generate with: openssl rand -hex 32>
#   DEFAULT_PSYCHOLOGIST_ID=<uuid>
#   NODE_FUNCTION_ALLOW_BUILTIN=crypto
#   N8N_BLOCK_ENV_ACCESS_IN_NODE=false
#   BOT_INTERNAL_URL=http://bot.railway.internal:3000

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

version: '3.8'

services:
  bot:
    build:
      context: ../bot
      dockerfile: ../bot/Dockerfile
    container_name: asistente-bot
    ports:
      - "3001:3001"
    volumes:
      - ./bot/bot_sessions:/app/bot_sessions
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - WA_PHONE_NUMBER=${WA_PHONE_NUMBER}
      - HEALTH_PORT=3001
      - PORT=3000
    restart: unless-stopped
    networks:
      - asistente-network

networks:
  asistente-network:
    external: true
